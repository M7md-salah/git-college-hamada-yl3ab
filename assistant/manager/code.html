    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');

</head>
<body class="flex h-screen overflow-hidden">
<!-- SideNavBar -->

<div class="flex items-center space-x-4 md:space-x-8">

<!-- Canvas -->

<div class="max-w-7xl mx-auto space-y-8">
<!-- Page Header -->
<div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6 overflow-hidden">
<div>

<p class="font-body text-sm md:text-body-md text-on-surface-variant">Academic Operations Hub • Fall 2026</p>
</div>

</button>
<button onclick="StateManager.openScheduleEdit('mon-9')" class="flex-1 md:flex-none justify-center bg-primary text-on-primary px-4 py-2.5 rounded-lg font-bold text-sm flex items-center bg-gradient-to-br from-primary to-primary-container shadow-xl hover:opacity-90 active:scale-95 transition-all">
<span class="material-symbols-outlined mr-2 text-sm">edit_calendar</span> Edit Master
</button>
</div>
</div>
<!-- Pending Approvals Widget -->
<section id="approvals-section" class="hidden bg-surface-container-lowest rounded-xl p-6 shadow-sm border border-outline-variant/20">
    <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-headline font-bold text-primary">Pending Registrations</h3>
        <span id="pending-count" class="bg-error text-on-error text-xs font-bold px-2 py-1 rounded-full">0</span>
    </div>
    <div id="approvals-list" class="space-y-4 max-h-64 overflow-y-auto pr-2">

</section>
<!-- Institutional Alerts (Visual Proof) -->
<section id="alerts-section" class="mb-8 animate-in slide-in-from-top-4 duration-500">
    <div class="flex items-center justify-between mb-4">
        <h3 class="font-headline font-bold text-lg text-primary flex items-center gap-2 uppercase tracking-tight">
            <span class="material-symbols-outlined text-secondary">analytics</span> Branch Oversight Alerts
        </h3>
        <button id="clear-alerts-btn" class="text-xs font-bold text-primary/40 hover:text-primary transition-colors">Dismiss All</button>
    </div>
    <div id="alerts-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- Dynamically populated -->
        <div class="md:col-span-2 p-6 text-center bg-surface-container-low/30 rounded-xl border border-dashed border-outline-variant/30 text-outline text-xs italic">
            No active oversight alerts.
        </div>
    </div>
</section>
<!-- Schedule Grid Concept (Bento-ish) -->
<div class="bg-surface-container-lowest rounded-xl p-4 md:p-8 shadow-2xl border border-outline-variant/10 overflow-hidden relative">
<div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
    <h2 class="text-xl font-headline font-black text-primary uppercase tracking-tighter">Live Session Distribution</h2>
    <!-- Legend -->
    <div class="flex flex-wrap items-center gap-4 font-body text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">
        <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-primary-fixed mr-2"></span> Academic</div>
        <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-tertiary-fixed-dim mr-2"></span> Events</div>
        <div class="flex items-center"><span class="w-3 h-3 rounded-full bg-surface-container-highest mr-2"></span> Maintenance</div>
    </div>
</div>
<!-- Wrap in a fixed height or max height for better UX -->
<div class="overflow-x-auto pb-4 scrollbar-thin">

        <!-- Dynamically injected by central state manager -->
    </div>
</div>

</div>
<script>
    // Theme toggle is handled globally in components.js if id="theme-toggle" exists

    // Dynamic Schedule Rendering
    function renderSchedule() {
        StateManager.renderGlobalSchedule('grid-schedule-container');
    }

    // Dynamic Approvals (Pending_Branch_Manager)
    function renderApprovals() {
        const approvalBody = document.getElementById('approval-queue-body');
        if(!approvalBody) return;
        
        const allRequests = StateManager.getRequests();
        const pending = allRequests.filter(r => r.status === 'Pending_Branch_Manager');
        
        if (pending.length === 0) {
            approvalBody.innerHTML = '<tr><td colspan="5" class="p-12 text-center text-on-surface-variant italic">No pending manager approvals.</td></tr>';
            return;
        }

        approvalBody.innerHTML = pending.map(req => {
            const isEditing = window.editingReqId == req.id;
            return `
            <tr class="hover:bg-primary/5 transition-colors group border-b border-outline-variant/10">
                <td class="p-4"><input type="checkbox" class="rounded border-outline-variant text-primary focus:ring-primary"></td>
                <td class="p-4">
                    ${isEditing ? `
                        <input type="text" id="edit-requester-${req.id}" value="${req.requester}" class="inline-edit-input mb-1">
                        <input type="text" id="edit-dept-${req.id}" value="${req.dept}" class="w-full bg-transparent text-[10px] font-bold uppercase outline-none focus:text-primary">
                    ` : `
                        <div class="font-bold text-primary">${req.requester}</div>
                        <div class="text-[10px] text-on-surface-variant font-bold uppercase">${req.dept}</div>
                    `}
                </td>
                <td class="p-4"><span class="px-2 py-0.5 bg-primary/10 text-primary rounded text-[10px] font-bold uppercase">${req.type || 'Room'}</span></td>
                <td class="p-4">
                    ${isEditing ? `
                        <input type="text" id="edit-name-${req.id}" value="${req.name}" class="inline-edit-input mb-1">
                        <input type="text" id="edit-details-${req.id}" value="${req.roomDetails} • ${req.reqTime}" class="w-full bg-transparent text-[10px] font-bold uppercase outline-none focus:text-primary">
                    ` : `
                        <div class="font-bold text-on-surface text-sm">${req.name}</div>
                        <div class="text-[10px] text-on-surface-variant">${req.roomDetails} • ${req.reqTime}</div>
                    `}
                </td>
                <td class="p-4 text-right">
                    <div class="flex items-center justify-end gap-2">
                        ${isEditing ? `
                            <button onclick="saveRequest(${req.id})" class="p-2 bg-primary text-on-primary rounded-lg shadow-lg hover:bg-primary-container transition-all">
                                <span class="material-symbols-outlined text-[18px]">check</span>
                            </button>
                            <button onclick="cancelEdit()" class="p-2 text-outline hover:bg-surface-variant rounded-lg">
                                <span class="material-symbols-outlined text-[18px]">close</span>
                            </button>
                        ` : `
                            <button onclick="startEdit(${req.id})" class="p-2 text-primary hover:bg-primary/5 rounded-lg opacity-0 group-hover:opacity-100 transition-all">
                                <span class="material-symbols-outlined text-[18px]">edit</span>
                            </button>
                            <button onclick="updateStatus(${req.id}, 'Denied')" class="p-1.5 text-error hover:bg-error-container rounded-md">
                                <span class="material-symbols-outlined text-[18px]">close</span>
                            </button>
                            <button onclick="updateStatus(${req.id}, 'Approved')" class="px-4 py-1.5 bg-primary text-on-primary rounded-lg text-xs font-bold shadow-lg hover:bg-primary-container transition-all">
                                Approve
                            </button>
                        `}
                    </div>
                </td>
            </tr>
            `;
        }).join('');
    }

    // Inline Edit Logic
    window.editingReqId = null;
    window.startEdit = (id) => {
        window.editingReqId = id;
        renderApprovals();
    };
    window.cancelEdit = () => {
        window.editingReqId = null;
        renderApprovals();
    };
    window.saveRequest = (id) => {
        const detailsInput = document.getElementById(`edit-details-${id}`).value;
        const [roomDetails, reqTime] = detailsInput.includes(' • ') ? detailsInput.split(' • ') : [detailsInput, 'TBD'];
        
        const newData = {
            requester: document.getElementById(`edit-requester-${id}`).value,
            dept: document.getElementById(`edit-dept-${id}`).value,
            name: document.getElementById(`edit-name-${id}`).value,
            roomDetails: roomDetails,
            reqTime: reqTime
        };
        StateManager.updateRequest(id, newData);
        window.editingReqId = null;
        if(window.showToast) window.showToast("Changes saved successfully.");
    };

    // Initialize listeners
    StateManager.on('RequestsUpdated', () => renderApprovals());
    }

    window.updateStatus = function(id, status) {
        StateManager.updateRequestStatus(id, status);
        if (window.showToast) window.showToast(`Request ${status} successfully.`);
        renderApprovals();
    };

    StateManager.on('ScheduleUpdated', () => renderSchedule());
    StateManager.on('RequestsUpdated', () => renderApprovals());
    
    renderSchedule();
    renderApprovals();

    // StateManager handles schedule editing via renderGlobalSchedule internals
    // No redundant local modal logic needed

    // Ensure master schedule default exists
    if (!localStorage.getItem('masterSchedule')) {
        localStorage.setItem('masterSchedule', JSON.stringify({
            'mon-9': { title: 'Calculus III', room: 'Math 301', prof: 'Dr. Jones', color: 'primary' },
            'tue-10:30': { title: 'Adv. Quantum', room: 'Phys 410', prof: 'Dr. Marcus Johnson', color: 'secondary' },
            'wed-9': { title: 'Calculus III', room: 'Math 301', prof: 'Dr. Jones', color: 'primary' },
            'thu-10:30': { title: 'Adv. Quantum', room: 'Phys 410', prof: 'Dr. Marcus Johnson', color: 'secondary' },
            'fri-9': { title: 'Calculus III', room: 'Math 301', prof: 'Dr. Jones', color: 'primary' },
            'mon-1': { title: 'Modern Lit', room: 'Eng 205', prof: 'Prof. Smith', color: 'surface' },
            'wed-1': { title: 'Modern Lit', room: 'Eng 205', prof: 'Prof. Smith', color: 'surface' }
        }));
    }

    // Oversight Alerts Logic
    function renderAlerts() {
        const container = document.getElementById('alerts-container');
        if(!container) return;
        const notifs = JSON.parse(localStorage.getItem('managerNotifs')) || [];
        
        if (notifs.length === 0) {
            container.innerHTML = `<div class="md:col-span-2 p-6 text-center bg-surface-container-low/30 rounded-xl border border-dashed border-outline-variant/30 text-outline text-xs italic">No active oversight alerts.</div>`;
            return;
        }

        container.innerHTML = notifs.slice().reverse().map(n => {
            const isSpecial = n.text.includes('Secretary to the Dean');
            return `
                <div class="${isSpecial ? 'bg-secondary-container/20 border-secondary' : 'bg-primary/5 border-primary/20'} border rounded-xl p-4 flex flex-col gap-2 animate-in zoom-in duration-300 shadow-sm">
                    <div class="flex items-center justify-between">
                         <span class="text-[9px] font-bold uppercase tracking-widest text-outline">${new Date(n.timestamp).toLocaleTimeString()}</span>
                         <span class="w-1.5 h-1.5 rounded-full bg-secondary animate-ping"></span>
                    </div>
                    <p class="text-xs font-bold text-primary leading-relaxed">${n.text}</p>
                    <div class="mt-2 flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm text-secondary">verified_user</span>
                        <span class="text-[9px] font-black text-secondary tracking-widest uppercase">System Compliance</span>
                    </div>
                </div>
            `;
        }).join('');
    }

    document.getElementById('clear-alerts-btn')?.addEventListener('click', () => {
        localStorage.removeItem('managerNotifs');
        renderAlerts();
    });

    StateManager.on('managerNotifsUpdated', () => renderAlerts());
    renderAlerts();

    // Generic Mockup Handler
    document.addEventListener('DOMContentLoaded', () => {
        const toastHTML = `
            <div id="dev-toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 bg-primary text-on-primary font-body font-semibold text-sm rounded-lg shadow-xl opacity-0 pointer-events-none transition-opacity duration-300">
                Action coming soon in full release
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', toastHTML);
        const devToast = document.getElementById('dev-toast');

        function showDevToast(e) {
            e.preventDefault();
            let actionName = e.currentTarget.innerText.trim();
            if (!actionName) {
                const icon = e.currentTarget.querySelector('.material-symbols-outlined');
                if (icon) actionName = icon.textContent.trim();
            }
            actionName = actionName.split('\n')[0].trim();
            if (actionName && actionName.length > 25) actionName = "This feature";
            if (!actionName) actionName = "Action";
            
            const pageRole = document.title.split(' - ')[0] || "Module";
            devToast.innerHTML = `<span class="font-bold opacity-80 mr-2">[${pageRole}]</span> "${actionName}" coming soon.`;
            devToast.classList.remove('opacity-0');
            setTimeout(() => devToast.classList.add('opacity-0'), 2500);
        }

        document.querySelectorAll('a[href="#"]').forEach(el => {
            el.addEventListener('click', showDevToast);
        });

        document.querySelectorAll('button:not([id])').forEach(el => {
            if (!el.getAttribute('onclick') && el.type !== 'submit') {
                el.addEventListener('click', showDevToast);
            }
        });
    });
</script>
<script src="../stateManager.js"></script>
<script src="../components.js"></script>
</body></html>
